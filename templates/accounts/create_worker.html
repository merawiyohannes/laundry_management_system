{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <h1 class="text-3xl font-bold text-slate-800 mb-2">
        Create Worker
    </h1>

    <p class="text-slate-500 mb-8">
        Create a new staff account for your laundry.
    </p>

    <form method="POST"
          class="bg-white rounded-xl shadow p-6 md:p-8 space-y-6">

        {% csrf_token %}

        <div>

            <label for="name"
                   class="block text-sm font-semibold text-slate-700 mb-2">
                Full Name
            </label>

            <input
                id="name"
                type="text"
                name="name"
                required
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">

        </div>

        <div>

            <label for="phone"
                   class="block text-sm font-semibold text-slate-700 mb-2">
                Phone (Login Username)
            </label>

            <input
                id="phone"
                type="text"
                name="phone"
                required
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">

        </div>

        <div>

            <label for="password"
                   class="block text-sm font-semibold text-slate-700 mb-2">
                Password
            </label>

            <input
                id="password"
                type="password"
                name="password"
                required
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">

        </div>

        <div class="flex justify-end">

            <button
                class="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-lg shadow transition">

                Create Worker

            </button>

        </div>

    </form>

</div>

{% endblock %}
