<!DOCTYPE html>
<html>

<head>

    <title>Kokeb Laundry - Staff Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<div class="min-h-screen flex items-center justify-center px-4">

<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 md:p-10">

    <h1 class="text-3xl font-bold text-center text-blue-700">

        🧺 KOKEB LAUNDRY

    </h1>

    <p class="text-center text-slate-500 mt-2">

        Staff Login

    </p>

    {% if error %}

    <div class="mt-6 bg-red-100 text-red-700 rounded-lg p-4">

        {{ error }}

    </div>

    {% endif %}

    <form method="POST" class="mt-8 space-y-5">

        {% csrf_token %}

        <div>

            <label class="block text-sm font-semibold mb-2">
                Username
            </label>

            <input
                type="text"
                name="username"
                required
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">

        </div>

        <div>

            <label class="block text-sm font-semibold mb-2">
                Password
            </label>

            <input
                type="password"
                name="password"
                required
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">

        </div>

        <button
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg shadow transition">

            Login

        </button>

    </form>

    <div class="mt-6 text-center">

        <a href="/"
           class="text-blue-600 hover:underline">

            ← Back to Home

        </a>

    </div>

</div>

</div>

</body>

</html>
