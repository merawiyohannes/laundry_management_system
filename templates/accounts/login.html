<!DOCTYPE html>
<html>

<head>

    <title>Staff Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<div class="min-h-screen flex items-center justify-center">

<div class="bg-white p-10 rounded-xl shadow-xl w-full max-w-md">

    <h1 class="text-3xl font-bold text-center text-blue-700">

        KOKEB LAUNDRY

    </h1>

    <p class="text-center text-slate-500 mt-2">

        Staff Login

    </p>

    {% if error %}

    <div class="mt-6 bg-red-100 text-red-700 p-3 rounded">

        {{ error }}

    </div>

    {% endif %}

    <form method="POST" class="mt-8 space-y-5">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
            class="w-full border rounded-lg px-4 py-3">

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
            class="w-full border rounded-lg px-4 py-3">

        <button
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg">

            Login

        </button>

    </form>

    <div class="mt-6 text-center">

        <a href="/" class="text-blue-600">

            ← Back to Home

        </a>

    </div>

</div>

</div>

</body>

</html>
