{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <h1 class="text-3xl font-bold text-slate-800 mb-2">

        Change Password

    </h1>

    <p class="text-slate-500 mb-8">

        Update your account password securely.

    </p>

    <form method="POST"
          class="bg-white rounded-xl shadow p-6 md:p-8 space-y-6">

        {% csrf_token %}

        {{ form.non_field_errors }}

        <div>

            <label class="block text-sm font-semibold text-slate-700 mb-2">

                Current Password

            </label>

            {{ form.old_password }}

        </div>

        <div>

            <label class="block text-sm font-semibold text-slate-700 mb-2">

                New Password

            </label>

            {{ form.new_password1 }}

        </div>

        <div>

            <label class="block text-sm font-semibold text-slate-700 mb-2">

                Confirm New Password

            </label>

            {{ form.new_password2 }}

        </div>

        <div class="flex justify-end">

            <button
                class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg shadow transition">

                Save Password

            </button>

        </div>

    </form>

</div>

{% endblock %}
