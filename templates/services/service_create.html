{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl">

    <div class="mb-8">

        <h1 class="text-3xl font-bold text-slate-800">
            Add Service
        </h1>

        <p class="text-slate-500 mt-2">
            Create a laundry service and define its pricing.
        </p>

    </div>

    <form method="POST"
          class="bg-white rounded-xl shadow-lg p-8 space-y-6">

        {% csrf_token %}

        <div>

            <label
                for="name"
                class="block text-sm font-semibold text-slate-700 mb-2">

                Service Name

            </label>

            <input
                id="name"
                type="text"
                name="name"
                required
                placeholder="Example: Blanket"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-300 focus:border-blue-500 outline-none">

        </div>

        <div>

            <label
                for="pricing_type"
                class="block text-sm font-semibold text-slate-700 mb-2">

                Pricing Type

            </label>

            <select
                id="pricing_type"
                name="pricing_type"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-300 focus:border-blue-500 outline-none">

                <option value="ITEM">

                    Per Item

                </option>

                <option value="KG">

                    Per Kilogram

                </option>

            </select>

        </div>

        <div>

            <label
                for="unit_price"
                class="block text-sm font-semibold text-slate-700 mb-2">

                Unit Price (ETB)

            </label>

            <input
                id="unit_price"
                type="number"
                step="0.01"
                min="0"
                required
                name="unit_price"
                placeholder="Example: 120"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-300 focus:border-blue-500 outline-none">

        </div>

        <div class="flex justify-end gap-4">

            <a href="/services/"
               class="px-6 py-3 rounded-lg border border-slate-300 hover:bg-slate-100">

                Cancel

            </a>

            <button
                class="bg-green-600 hover:bg-green-700 transition text-white px-8 py-3 rounded-lg shadow">

                Save Service

            </button>

        </div>

    </form>

</div>

{% endblock %}
