{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-0">

    <div class="mb-8">

        <h1 class="text-2xl sm:text-3xl font-bold text-slate-800">
            Record Payment
        </h1>

        <p class="text-slate-500 mt-2 break-words">
            Order {{ order.receipt_number }} — {{ order.customer.name }}
        </p>

        <p class="text-sm text-slate-500 mt-1">
            Remaining:
            <span class="font-bold text-red-600">
                {{ order.balance_due|floatformat:2 }} ETB
            </span>
        </p>

    </div>

    <form method="POST"
          class="bg-white rounded-xl shadow-lg p-5 sm:p-6 md:p-8 space-y-6">

        {% csrf_token %}

        <!-- HIDDEN ORDER -->
        <input type="hidden" name="order" value="{{ order.id }}">

        <!-- AMOUNT -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
                Payment Amount (ETB)
            </label>

            <input
                type="number"
                step="0.01"
                min="1"
                max="{{ order.balance_due }}"
                required
                name="amount"
                placeholder="Enter payment amount"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 text-base
                       focus:ring-2 focus:ring-blue-300 outline-none">
        </div>

        <!-- METHOD -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
                Payment Method
            </label>

            <select name="method"
                    class="w-full border border-slate-300 rounded-lg px-4 py-3 text-base
                           focus:ring-2 focus:ring-blue-300 outline-none">

                <option value="CASH">Cash</option>
                <option value="TELEBIRR">Telebirr</option>

            </select>
        </div>

        <!-- BUTTONS -->
        <div class="flex flex-col sm:flex-row justify-end gap-3 pt-2">

            <a href="/orders/{{ order.id }}/"
               class="w-full sm:w-auto text-center px-6 py-3 rounded-lg border border-slate-300 hover:bg-slate-100 transition">
                Cancel
            </a>

            <button
                class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-lg shadow transition">

                Save Payment

            </button>

        </div>

    </form>

</div>

{% endblock %}
