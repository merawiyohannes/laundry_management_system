{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <div class="mb-8">

        <h1 class="text-2xl md:text-3xl font-bold text-slate-800">
            Record Payment
        </h1>

        <p class="text-slate-500 mt-2">
            Record a customer's payment for a laundry order.
        </p>

    </div>

    <form method="POST"
          class="bg-white rounded-xl shadow-lg p-5 md:p-8 space-y-6">

        {% csrf_token %}

        <div>

            <label
                for="order"
                class="block text-sm font-semibold text-slate-700 mb-2">

                Order

            </label>

            <select
                id="order"
                name="order"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-300 focus:border-blue-500 outline-none">

                {% for o in orders %}

                <option value="{{ o.id }}">
                    {{ o.receipt_number }} — {{ o.customer.name }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div>

            <label
                for="amount"
                class="block text-sm font-semibold text-slate-700 mb-2">

                Payment Amount (ETB)

            </label>

            <input
                id="amount"
                type="number"
                step="0.01"
                min="1"
                required
                name="amount"
                placeholder="Enter payment amount"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-300 focus:border-blue-500 outline-none">

        </div>

        <div>

            <label
                for="method"
                class="block text-sm font-semibold text-slate-700 mb-2">

                Payment Method

            </label>

            <select
                id="method"
                name="method"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-300 focus:border-blue-500 outline-none">

                <option value="CASH">
                    Cash
                </option>

                <option value="TELEBIRR">
                    Telebirr
                </option>

            </select>

        </div>

        <div class="flex flex-col sm:flex-row justify-end gap-3">

            <a href="/payments/"
               class="w-full sm:w-auto text-center px-6 py-3 rounded-lg border border-slate-300 hover:bg-slate-100">

                Cancel

            </a>

            <button
                class="w-full sm:w-auto bg-green-600 hover:bg-green-700 transition text-white px-8 py-3 rounded-lg shadow">

                Save Payment

            </button>

        </div>

    </form>

</div>

{% endblock %}
