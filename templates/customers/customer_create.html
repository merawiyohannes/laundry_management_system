{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl">

    <h1 class="text-3xl font-bold text-slate-800 mb-2">

        Add Customer

    </h1>

    <p class="text-slate-500 mb-8">

        Register a new customer before creating an order.

    </p>

    <form method="POST"
          class="bg-white rounded-xl shadow p-8 space-y-6">

        {% csrf_token %}

        <div>

            <label
                for="name"
                class="block text-sm font-semibold text-slate-700 mb-2">

                Full Name

            </label>

            <input
                id="name"
                type="text"
                name="name"
                required
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none">

        </div>

        <div>

            <label
                for="phone"
                class="block text-sm font-semibold text-slate-700 mb-2">

                Phone Number

            </label>

            <input
                id="phone"
                type="text"
                name="phone"
                required
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none">

        </div>

        <div>

            <label
                for="address"
                class="block text-sm font-semibold text-slate-700 mb-2">

                Address

            </label>

            <textarea
                id="address"
                name="address"
                rows="4"
                class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none"></textarea>

        </div>

        <div class="flex justify-end">

            <button
                class="bg-green-600 hover:bg-green-700 transition text-white px-8 py-3 rounded-lg shadow">

                Save Customer

            </button>

        </div>

    </form>

</div>

{% endblock %}
