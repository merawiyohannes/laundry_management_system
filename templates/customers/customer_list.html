{% extends "base.html" %}

{% block content %}

<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8">

    <div>

        <h1 class="text-2xl md:text-3xl font-bold text-slate-800">
            Customers
        </h1>

        <p class="text-slate-500 mt-1">
            Manage all registered customers.
        </p>

    </div>

    <a href="/customers/create/"
       class="bg-blue-600 hover:bg-blue-700 transition text-white px-5 py-3 rounded-lg shadow text-center">

        + Add Customer

    </a>

</div>

<div class="bg-white rounded-xl shadow overflow-hidden">

    <div class="overflow-x-auto">

        <table class="min-w-full">

            <thead class="bg-slate-100">

                <tr>

                    <th class="text-left p-4 whitespace-nowrap">Name</th>
                    <th class="text-left p-4 whitespace-nowrap">Phone</th>
                    <th class="text-left p-4 whitespace-nowrap">Address</th>

                </tr>

            </thead>

            <tbody>

                {% for c in customers %}

                <tr class="border-t hover:bg-slate-50">

                    <td class="p-4 font-medium text-slate-700 whitespace-nowrap">
                        {{ c.name }}
                    </td>

                    <td class="p-4 whitespace-nowrap">
                        {{ c.phone }}
                    </td>

                    <td class="p-4 text-slate-600">
                        {{ c.address }}
                    </td>

                </tr>

                {% empty %}

                <tr>

                    <td colspan="3" class="text-center py-12 text-slate-400">

                        No customers found.

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
