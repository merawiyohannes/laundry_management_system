{% extends "base.html" %}

{% block content %}

<div class="flex justify-between items-center mb-8">

    <div>

        <h1 class="text-3xl font-bold text-slate-800">
            Customers
        </h1>

        <p class="text-slate-500 mt-1">
            Manage all registered customers.
        </p>

    </div>

    <a href="/customers/create/"
       class="bg-blue-600 hover:bg-blue-700 transition text-white px-5 py-3 rounded-lg shadow">

        + Add Customer

    </a>

</div>

<div class="bg-white rounded-xl shadow overflow-hidden">

    <table class="w-full">

        <thead class="bg-slate-100">

            <tr>

                <th class="text-left p-4">Name</th>
                <th class="text-left p-4">Phone</th>
                <th class="text-left p-4">Address</th>

            </tr>

        </thead>

        <tbody>

            {% for c in customers %}

            <tr class="border-t hover:bg-slate-50">

                <td class="p-4 font-medium text-slate-700">
                    {{ c.name }}
                </td>

                <td class="p-4">
                    {{ c.phone }}
                </td>

                <td class="p-4 text-slate-600">
                    {{ c.address }}
                </td>

            </tr>

            {% empty %}

            <tr>

                <td colspan="3" class="text-center py-12 text-slate-400">

                    No customers found.

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
